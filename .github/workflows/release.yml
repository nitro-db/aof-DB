name: release

# Publishes NEDB on a version tag:
#   * PyPI — a universal pure-Python wheel (py3-none-any) + sdist, so `pip install
#            nedb-engine` works on EVERY platform/Python with no toolchain, and the
#            `nedbd` console script is always available.
#   * npm  — napi-rs prebuilt native node addon, package "nedb-engine".
# Secrets required: PYPI_API_TOKEN, NPM_TOKEN.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- PyPI -----
  pypi:
    name: Publish to PyPI (universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 tests/test_nedb.py        # 11/11 invariants gate the release
      - run: pip install --upgrade build twine
      - run: python -m build                   # -> py3-none-any wheel + sdist
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing --verbose dist/*

  # ---------------------------------------------------- Python native wheels ----
  # Builds the PyO3 (maturin) native extension for Linux / macOS / Windows.
  # These platform wheels are uploaded to PyPI alongside the universal pure-Python
  # wheel so `pip install nedb-engine` gets the Rust-accelerated core automatically.
  wheels:
    name: Python native wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin      }
          - { os: windows-latest, target: x86_64-pc-windows-msvc   }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Stage Python source into crate (maturin mixed layout)
        # maturin only bundles a python-source that lives inside the project root.
        # Copy python/nedb -> rust/crates/nedb-py/python/nedb so the native wheel
        # ships the full package (all .py modules + nedbd) next to _native.so,
        # not just the bare extension. Runs on the host; the repo is mounted into
        # the manylinux container, so the staged dir is visible to maturin.
        shell: bash
        run: |
          rm -rf rust/crates/nedb-py/python
          mkdir -p rust/crates/nedb-py/python
          cp -r python/nedb rust/crates/nedb-py/python/nedb
          echo "Staged $(find rust/crates/nedb-py/python/nedb -name '*.py' | wc -l) python files"
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Run from inside the crate so maturin finds pyproject.toml +
          # ./python/nedb and bundles the full package with the .so extension.
          working-directory: rust/crates/nedb-py
          args: --release --out ../../../dist
          manylinux: auto
          target: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish-native:
    name: Publish native wheels to PyPI
    needs: [wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install twine
      - name: Upload native wheels
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*.whl

  # ----------------------------------------------------------------- npm -----
  node-binaries:
    name: napi (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm install
      - name: Build native addon
        run: npx @napi-rs/cli build --platform --release --target ${{ matrix.target }} --cargo-cwd rust/crates/nedb-node
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            *.node
            index.js
            index.d.ts

  publish-npm:
    needs: node-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: .
      - name: Publish to npm (all platform binaries bundled in one package)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
