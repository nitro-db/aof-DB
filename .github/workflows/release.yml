name: release

# Publishes NEDB on a version tag:
#   * PyPI — a universal pure-Python wheel (py3-none-any) + sdist, so `pip install
#            nedb-engine` works on EVERY platform/Python with no toolchain, and the
#            `nedbd` console script is always available.
#   * npm  — napi-rs prebuilt native node addon, package "nedb-engine".
# Secrets required: PYPI_API_TOKEN, NPM_TOKEN.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- PyPI -----
  pypi:
    name: Publish to PyPI (universal)
    runs-on: ubuntu-latest
    # Wait for Linux+Windows native extensions AND nedbd-v2 binaries.
    # Mac extensions arrive from Codemagic via the GitHub release poll below.
    needs: [node-binaries, create-release, wheels]
    if: "!cancelled()"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ── Collect _native extensions from CI artifact store ──────────────────
      # Each wheels job extracted nedb/_native.* from its built wheel and
      # uploaded it as native-ext-{label}.  Download them all here.
      - name: Download _native extension artifacts (Linux + Windows)
        uses: actions/download-artifact@v4
        with:
          pattern: native-ext-*
          merge-multiple: true
          path: native-ext
      - name: Stage _native extensions into python/nedb/
        shell: bash
        run: |
          echo "native-ext contents:"; find native-ext -type f | sort || echo "(none)"
          # Copy every _native.* file found into the Python package.
          find native-ext -type f -name "_native*" | while read f; do
            fname=$(basename "$f")
            cp "$f" "python/nedb/$fname"
            chmod +x "python/nedb/$fname" 2>/dev/null || true
            echo "  staged: python/nedb/$fname"
          done
      # ── Wait for Mac extensions from Codemagic ────────────────────────────
      # Codemagic uploads nedbd-v2-darwin-* AND mac _native .so files to the
      # GitHub release.  Poll until both server binaries appear (the extensions
      # come in the same upload), then download everything.
      - name: Wait for Mac artifacts from Codemagic + download all
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Polling GitHub release for Mac nedbd-v2 + _native binaries..."
          for i in $(seq 1 35); do
            ASSETS=$(gh release view "$VERSION" --json assets --jq '[.assets[].name]' 2>/dev/null || echo "[]")
            ARM=$(echo "$ASSETS" | grep -c "nedbd-v2-darwin-arm64" || true)
            X86=$(echo "$ASSETS" | grep -c "nedbd-v2-darwin-x64" || true)
            echo "  Attempt $i/35 — darwin-arm64=$ARM darwin-x64=$X86"
            if [ "$ARM" -gt 0 ] && [ "$X86" -gt 0 ]; then
              echo "Mac binaries found — downloading"
              break
            fi
            [ "$i" -eq 35 ] && echo "Timeout — proceeding without Mac"
            sleep 60
          done
          gh release download "$VERSION" --pattern "nedbd-v2-*" --dir . --clobber || true
          gh release download "$VERSION" --pattern "_native*darwin*" --dir native-ext --clobber || true
          # Stage nedbd-v2 server binaries
          [ -f nedbd-v2-linux-x64 ]      && cp nedbd-v2-linux-x64      python/nedb/nedbd-v2              && chmod +x python/nedb/nedbd-v2
          [ -f nedbd-v2-win-x64.exe ]    && cp nedbd-v2-win-x64.exe    python/nedb/nedbd-v2.exe
          [ -f nedbd-v2-darwin-arm64 ]   && cp nedbd-v2-darwin-arm64   python/nedb/nedbd-v2-darwin-arm64 && chmod +x python/nedb/nedbd-v2-darwin-arm64
          [ -f nedbd-v2-darwin-x64 ]     && cp nedbd-v2-darwin-x64     python/nedb/nedbd-v2-darwin-x64   && chmod +x python/nedb/nedbd-v2-darwin-x64
          # Stage any Mac _native extensions that Codemagic uploaded
          find native-ext -type f -name "_native*darwin*" 2>/dev/null | while read f; do
            fname=$(basename "$f")
            cp "$f" "python/nedb/$fname" && chmod +x "python/nedb/$fname" || true
            echo "  staged mac ext: python/nedb/$fname"
          done
          echo "Final python/nedb/ contents:"
          ls -lh python/nedb/nedbd* python/nedb/_native* 2>/dev/null || echo "(none)"
      - run: python3 tests/test_nedb.py
      - run: pip install --upgrade build twine
      - run: python -m build
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing --verbose dist/*

  # ---------------------------------------------------- Python native wheels ----
  # Builds the PyO3 (maturin) native extension for Linux / macOS / Windows.
  # These platform wheels are uploaded to PyPI alongside the universal pure-Python
  # wheel so `pip install nedb-engine` gets the Rust-accelerated core automatically.
  wheels:
    name: Python native wheel (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40        # fail fast if runner is unavailable — continue-on-error handles it
    continue-on-error: true    # slow/unavailable Mac runners don't block other platforms
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  label: linux-x86_64,   mingw: false }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    label: windows-x86_64, mingw: false }
          # macOS wheels (arm64 + x86_64) are built by Codemagic on M2 Mac Minis.
          # MinGW/MSYS2 users get the binary via the fat py3-none-any universal wheel.
          # PyPI rejects mingw_x86_64 platform tags so a separate MinGW wheel is omitted.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ── MinGW / MSYS2 setup (windows-gnu only) ────────────────────────────────
      # MSYS2 MinGW64 Python has platform tags like mingw_x86_64_msvcrt_gnu.
      # Maturin must run INSIDE MSYS2 using that Python as the interpreter so
      # the resulting wheel is tagged for MinGW and pip on MSYS2 installs it.
      - name: Set up MSYS2 MinGW64 (Python + pip + gcc + rust)
        if: matrix.mingw
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-rust
      # ── Standard Rust toolchain (non-MinGW only) ───────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        if: "!matrix.mingw"
        with:
          targets: ${{ matrix.target }}
      # ── nedbd-v2 binary (MSVC build for both — .exe runs in any Windows env) ─
      - name: Build nedbd-v2 (DAG engine binary)
        if: "!matrix.mingw"
        shell: bash
        run: |
          cd rust
          cargo build --release --bin nedbd --package nedb-engine --target ${{ matrix.target }}
          cd ..
          EXT=""
          [[ "${{ matrix.target }}" == *"windows"* ]] && EXT=".exe"
          BIN="rust/target/${{ matrix.target }}/release/nedbd${EXT}"
          DEST="python/nedb/nedbd-v2${EXT}"
          cp "$BIN" "$DEST"
          chmod +x "$DEST" || true
          echo "nedbd-v2 staged: $(ls -lh $DEST)"
      - name: Build nedbd-v2 (MinGW binary)
        if: matrix.mingw
        shell: msys2 {0}
        run: |
          cd rust
          cargo build --release --bin nedbd --package nedb-engine
          cd ..
          cp rust/target/release/nedbd.exe python/nedb/nedbd-v2.exe
          echo "nedbd-v2 MinGW staged: $(ls -lh python/nedb/nedbd-v2.exe)"
      - name: Stage Python source + binary into maturin layout
        shell: bash
        run: |
          rm -rf rust/crates/nedb-py/python
          mkdir -p rust/crates/nedb-py/python
          cp -r python/nedb rust/crates/nedb-py/python/nedb
          find rust/crates/nedb-py/python/nedb -name "nedbd-v2*" -exec chmod +x {} \; || true
          echo "Staged $(find rust/crates/nedb-py/python/nedb -name '*.py' | wc -l) .py files"
          if ls rust/crates/nedb-py/python/nedb/nedbd-v2* 2>/dev/null; then
            echo "nedbd-v2 binary confirmed in staging area"
          else
            echo "ERROR: nedbd-v2 binary missing from staging area"
            exit 1
          fi
      # ── Build wheel — maturin-action for standard targets ─────────────────
      - name: Build wheel (maturin — standard)
        if: "!matrix.mingw"
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: rust/crates/nedb-py
          args: --release --out ../../../dist
          manylinux: auto
          target: ${{ matrix.target }}
      # ── Build wheel — MSYS2 maturin for MinGW ─────────────────────────────
      # Run maturin with MSYS2 MinGW Python so the wheel gets mingw_x86_64_*
      # platform tags that MSYS2/Git Bash pip recognises and installs.
      - name: Install maturin in MSYS2 (MinGW only)
        if: matrix.mingw
        shell: msys2 {0}
        run: pip install maturin
      - name: Build wheel (maturin — MinGW)
        if: matrix.mingw
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cd rust/crates/nedb-py
          maturin build --release --out ../../../dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.label }}
          path: dist
      # Extract the _native .pyd/.so from the wheel so the pypi job can embed
      # it in the universal wheel — lets `from nedb._native import NedbCore`
      # work on any platform without needing the platform wheel installed.
      - name: Extract _native extension for universal wheel
        if: "!matrix.mingw"
        shell: bash
        run: |
          python3 scripts/extract_native.py "dist/*.whl" native-ext
          echo "native-ext contents:"; ls -lhR native-ext/ 2>/dev/null || echo "(none)"
      - uses: actions/upload-artifact@v4
        if: "!matrix.mingw"
        with:
          name: native-ext-${{ matrix.label }}
          path: native-ext
          if-no-files-found: ignore

  publish-native:
    name: Publish native wheels to PyPI
    needs: [wheels]
    runs-on: ubuntu-latest
    # Run even if some wheel jobs failed (e.g. slow Mac runner) — publish whatever built.
    # --skip-existing means partial uploads are safe and idempotent.
    if: startsWith(github.ref, 'refs/tags/') && !cancelled()
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*   # matches wheels-linux-x86_64, wheels-macos-arm64, wheels-macos-x86_64, wheels-windows-x86_64
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install twine
      - name: Upload native wheels
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*.whl

  # ----------------------------------------------------------- crates.io -----
  publish-crate:
    name: Publish nedb-engine to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish nedb-engine to crates.io
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --package nedb-engine --allow-dirty 2>&1 || \
            echo "Publish skipped (version may already exist on crates.io)"

  # ----------------------------------------------------------------- npm -----
  # Builds the napi-rs native addon for each platform via @napi-rs/cli.
  # Produces platform-specific .node binaries + the JS/TS shims.
  # Root package.json drives the build; nedb-node/Cargo.toml is the Rust crate.
  # Create the GitHub release on tag push so Codemagic has a release to upload Mac binaries to.
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release (if not exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "$VERSION" --title "$VERSION" --notes "Release $VERSION" \
            --draft=false 2>/dev/null || echo "Release already exists"

  node-binaries:
    name: napi (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [create-release]
    timeout-minutes: 40
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu  }
          - { os: windows-latest, target: x86_64-pc-windows-msvc    }
          # macOS napi builds handled by Codemagic — uploaded directly to the GitHub release.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install @napi-rs/cli
        run: npm install
      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }} --cargo-cwd rust/crates/nedb-node
      - name: Build nedbd-v2 binary (DAG engine daemon)
        shell: bash
        run: |
          cd rust
          cargo build --release --bin nedbd --package nedb-engine --target ${{ matrix.target }}
          cd ..
          # Stage the binary with the platform-suffixed name the JS shim expects.
          # Naming matches the .node convention: nedbd-v2-<platform>-<arch>[.exe]
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            SRC="rust/target/${{ matrix.target }}/release/nedbd"
            DEST="nedbd-v2-linux-x64"
          elif [[ "${{ matrix.target }}" == "x86_64-pc-windows-msvc" ]]; then
            SRC="rust/target/${{ matrix.target }}/release/nedbd.exe"
            DEST="nedbd-v2-win-x64.exe"
          else
            echo "Unknown target ${{ matrix.target }}"; exit 1
          fi
          cp "$SRC" "$DEST"
          chmod +x "$DEST" || true
          echo "Staged nedbd-v2 binary: $(ls -lh $DEST)"
      - name: Upload .node + nedbd-v2 binaries to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in *.node; do
            [ -f "$f" ] && gh release upload "${{ github.ref_name }}" "$f" --clobber || true
          done
          # Upload platform-suffixed nedbd-v2 binary (linux-x64 or win-x64.exe)
          for f in nedbd-v2-linux-x64 nedbd-v2-win-x64.exe; do
            [ -f "$f" ] && gh release upload "${{ github.ref_name }}" "$f" --clobber || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            *.node
            nedbd-v2-linux-x64
            nedbd-v2-win-x64.exe
            index.js
            index.d.ts
          if-no-files-found: ignore

  # ---------------------------------------------------- smoke gate -----
  # Runs the shipped `npm test` (test/smoke.mjs) against the freshly-built
  # Linux napi .node addon. If any of the five acts fail (non-zero exit, or
  # the success banner is missing) this job fails and the npm publish below
  # is skipped — a red smoke means nothing ships.
  smoke-gate:
    name: Smoke gate (npm test vs built addon)
    needs: [node-binaries]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download freshly-built Linux napi addon (.node + index.js)
        uses: actions/download-artifact@v4
        with:
          name: node-x86_64-unknown-linux-gnu
          path: .
      - name: npm test (smoke.mjs) against the built addon — must pass to publish
        shell: bash
        run: |
          set -euo pipefail
          echo "Testing freshly-built artifacts:"; ls -lh *.node index.js test/smoke.mjs
          # Exit code is the gate; the banner grep is the explicit parse.
          node test/smoke.mjs | tee smoke-out.txt
          grep -q "all five acts passed" smoke-out.txt
          echo "✅ smoke gate passed — clearing npm publish"

  publish-npm:
    needs: [node-binaries, smoke-gate]
    runs-on: ubuntu-latest
    # HARD GATE: publish to npm only if the smoke test passed against the
    # freshly-built native addon. A red smoke = no publish.
    if: startsWith(github.ref, 'refs/tags/') && needs.smoke-gate.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Download Linux + Windows napi + nedbd-v2 artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: .
      - name: Wait for Mac binaries from Codemagic (max 35 min)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Polling GitHub release for Mac .node binaries..."
          for i in $(seq 1 35); do
            ASSETS=$(gh release view "$VERSION" --json assets --jq '[.assets[].name]' 2>/dev/null || echo "[]")
            ARM=$(echo "$ASSETS" | grep -c "darwin-arm64" || true)
            X86=$(echo "$ASSETS" | grep -c "darwin-x64" || true)
            echo "  Attempt $i/35 — arm64=$ARM x86_64=$X86"
            if [ "$ARM" -gt 0 ] && [ "$X86" -gt 0 ]; then
              echo "Mac binaries found — downloading .node + nedbd-v2"
              gh release download "$VERSION" --pattern "*.node" --dir . --clobber
              # Pull every platform-suffixed nedbd-v2 binary from the release
              # (linux-x64 and win-x64.exe are already local from the artifact step
              # above; --clobber makes the download idempotent. darwin-arm64 and
              # darwin-x64 come from Codemagic.)
              gh release download "$VERSION" --pattern "nedbd-v2-*" --dir . --clobber || true
              break
            fi
            if [ "$i" -eq 35 ]; then
              echo "Timeout — publishing without Mac binaries (Codemagic may still upload later)"
              # Still grab whatever nedbd-v2-* assets exist on the release so we
              # ship at minimum the linux/windows binaries we know are uploaded.
              gh release download "$VERSION" --pattern "nedbd-v2-*" --dir . --clobber || true
            fi
            sleep 60
          done
          echo "Final .node files:     $(ls *.node 2>/dev/null || echo 'none')"
          echo "Final nedbd-v2 files:  $(ls nedbd-v2-* 2>/dev/null || echo 'none')"
      - name: Make nedbd-v2 binaries executable
        shell: bash
        run: |
          for f in nedbd-v2-linux-x64 nedbd-v2-darwin-arm64 nedbd-v2-darwin-x64; do
            [ -f "$f" ] && chmod +x "$f"
          done
          ls -lh nedbd-v2-* 2>/dev/null || true
      - name: Publish to npm (all available platform binaries)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if echo "$VERSION" | grep -qE '(alpha|beta|rc|pre)'; then
            TAG=$(echo "$VERSION" | grep -oE '(alpha|beta|rc|pre)[.0-9]*' | head -1 | sed 's/[.].*$//')
            npm publish --access public --tag "$TAG"
          else
            npm publish --access public
          fi

  # ---------------------------------------------------------- nedb-engine-client -----
  # Publishes the lightweight HTTP client alongside the engine.
  # Same v* tag ships everything — one workflow, one source of truth.

  client-pypi:
    name: Publish nedb-engine-client to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Smoke test
        run: |
          pip install httpx
          python3 -c "
          import sys; sys.path.insert(0, 'client/python')
          from nedb_client import NedbClient, NedbError
          print('nedb_client import OK:', NedbClient(url='http://127.0.0.1:7070', db='test'))
          "
      - name: Build
        run: |
          pip install --upgrade build twine
          cd client/python
          python -m build
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd client/python
          twine upload --skip-existing --verbose dist/*

  client-npm:
    name: Publish nedb-engine-client to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build TypeScript
        run: |
          cd client/node
          npm install
          npx tsc
          mkdir -p dist
          cp dist/index.js dist/index.esm.js
          sed -i 's/^"use strict";//' dist/index.esm.js
          echo "Build complete:"; ls -lh dist/
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd client/node
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Publishing nedb-engine-client@$VERSION"
          npm publish --access public
