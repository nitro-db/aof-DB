name: release-client

# Publishes nedb-client on a client version tag: cv*
# Tags: cv1.0.0, cv1.0.1, etc.
#   * PyPI — nedb-client (pure Python wheel + sdist)
#   * npm  — nedb-client (compiled TypeScript)

on:
  push:
    tags: ["cv*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── PyPI ──────────────────────────────────────────────────────────────────
  pypi:
    name: Publish nedb-client to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Smoke test
        run: |
          pip install httpx
          python3 -c "
          import sys; sys.path.insert(0, 'client/python')
          from nedb_client import NedbClient, NedbError
          print('nedb_client import OK')
          c = NedbClient(url='http://127.0.0.1:7070', db='test')
          print('NedbClient instantiation OK:', c)
          "
      - name: Build
        run: |
          pip install --upgrade build twine
          cd client/python
          python -m build
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd client/python
          twine upload --skip-existing --verbose dist/*

  # ── npm ───────────────────────────────────────────────────────────────────
  npm:
    name: Publish nedb-client to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build TypeScript
        run: |
          cd client/node
          npm install
          npx tsc
          # Create ESM shim
          mkdir -p dist
          cp dist/index.js dist/index.esm.js
          sed -i 's/^"use strict";//' dist/index.esm.js
          echo "Build complete — dist contents:"
          ls -lh dist/
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd client/node
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Publishing nedb-client@$VERSION"
          npm publish --access public
